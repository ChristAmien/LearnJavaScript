<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- todo-liste -->
     <a href="#">
        <img src="images/logo_amien.png" alt="logo_amien" class="logo_amien">
     </a>
    <div class="todo-container">
        <h1 class="todo-title">Ma Todo Liste</h1>
        <div class="todo-input-section">
            <input type="text" class="todo-input" placeholder="Ajouter une tâche...">
            <button class="todo-add-btn">Ajouter</button>
            <!-- le <p class="error-msg"> sera ajouté ici dynamiquement -->
        </div>
    </div>
    <div class="todo-tab">
        <ul class="todo-list">
            <h1 class="todo-tite">Liste</h1>
            <!-- Les tâches seront ajoutées ici dynamiquement -->
        </ul>
    </div>
        <script src="script.js"></script>

</body>
</html>
